# Catalogue d'erreurs communes (§6.4). Chaque réponse porte les headers communs
# et le schéma StandardError. Injectées par $ref selon la pertinence.
components:
  responses:
    Error400:
      description: Bad request (400). The request contains invalid parameters, malformed
        syntax, or missing required fields. Check the error details in the response
        body for specific validation issues.
      headers: &errorHeaders
        X-Request-Id:          { $ref: '#/components/headers/EchoRequestId' }
        X-Correlation-Id:      { $ref: '#/components/headers/EchoCorrelationId' }
        X-Institution-Id:      { $ref: '#/components/headers/EchoInstitutionId' }
        X-User-Id:             { $ref: '#/components/headers/EchoUserId' }
        X-UserContext-Id:      { $ref: '#/components/headers/EchoUserContextId' }
        X-Processing-Route-Id: { $ref: '#/components/headers/ProcessingRouteId' }
      content: &errorContent
        application/json:
          schema: { $ref: '#/components/schemas/StandardError' }
    Error401:
      description: Unauthorized (401). Authentication is required but was not provided
        or the provided credentials are invalid. Ensure you have included a valid
        Bearer token in the Authorization header.
      headers: *errorHeaders
      content: *errorContent
    Error403:
      description: Forbidden (403). The request is authenticated but lacks the necessary
        permissions to access the requested resource. Contact your administrator to
        request access.
      headers: *errorHeaders
      content: *errorContent
    Error404:
      description: Not Found (404). The requested resource does not exist or has been
        deleted. Verify the resource ID and endpoint URL.
      headers: *errorHeaders
      content: *errorContent
    Error405:
      description: Method Not Allowed (405). The HTTP method used is not supported for the requested
        resource. Check the API documentation for allowed methods on this endpoint.
      headers: *errorHeaders
      content: *errorContent
    Error406:
      description: Not Acceptable (406). The requested resource is capable of generating only content
        not acceptable according to the Accept headers sent in the request. Adjust
        the Accept header to a supported media type.
      headers: *errorHeaders
      content: *errorContent
    Error409:
      description: Conflict (409). The request conflicts with the current state of
        the resource (e.g., duplicate entry, resource already exists, or version mismatch).
        Review the error details for more information.
      headers: *errorHeaders
      content: *errorContent
    Error422:
      description: Unprocessable Entity (422). The request is well-formed but contains
        semantic errors that prevent processing (e.g., invalid values, unsupported
        operations). Check the error details for specific issues.
      headers: *errorHeaders
      content: *errorContent
    Error429:
      description: Too Many Requests (429). Rate limit has been exceeded. Wait before
        making additional requests. Check response headers for rate limit information.
      headers: *errorHeaders
      content: *errorContent
    Error500:
      description: Internal Server Error (500). An unexpected error occurred on the
        server. Please retry the request. If the problem persists, contact support
        with the X-Request-Id from the response.
      headers: *errorHeaders
      content: *errorContent
    Error502:
      description: Bad Gateway (502). An error occurred while the gateway received
        an invalid response from an upstream server. Please retry the request. If
        the problem persists, contact support.
      headers: *errorHeaders
      content: *errorContent
    Error503:
      description: Service Unavailable (503). The service is temporarily unavailable,
        likely due to maintenance or high load. Please retry after a few moments.
      headers: *errorHeaders
      content: *errorContent
    Error504:
      description: Gateway Timeout (504). The gateway did not receive a timely response
        from an upstream server. The request may or may not have been processed. Please
        retry with idempotency key to ensure safe retry.
      headers: *errorHeaders
      content: *errorContent
